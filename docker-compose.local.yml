services:
  cloud-agent:
    build:
      context: .
      dockerfile: cloud-agent/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./shared:/app/shared
      - ./cloud-agent/src:/app/cloud-agent/src
      - ./cloud-agent/scripts:/app/cloud-agent/scripts
      - /app/cloud-agent/node_modules
      # Embeddings (cloud-agent/src/db/embeddings.ts) call Vertex AI via ADC, not an API key.
      # Run `gcloud auth application-default login` on the host first.
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    environment:
      - NODE_ENV=development
      - MOCK_FIREBASE_AUTH=true
      - GOOGLE_GENAI_USE_VERTEXAI=true
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT:?Set GCP_PROJECT to your Vertex AI-enabled GCP project (e.g. clanker-prod)}
      - GOOGLE_CLOUD_LOCATION=global
      - DATABASE_URL=postgres://clanker_dev:local_pass@postgres_db:5432/clanker
      - CORS_ORIGIN=http://localhost:8081,http://localhost:8082
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=clanker_dev
      - POSTGRES_PASSWORD=local_pass
      - POSTGRES_DB=clanker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clanker_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
