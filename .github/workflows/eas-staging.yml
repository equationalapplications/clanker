name: Staging Test, Release
on:
  push:
    branches:
      - staging
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    # Security: Explicit permissions for semantic-release
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # Use built-in github.token for checkout (reliable authentication)
      # GH_PAT will be used later by semantic-release to bypass branch protection
      - name: 🏗 Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Install semantic-release extra plugins
        run: npm install --save-dev @semantic-release/changelog @semantic-release/git @semantic-release/npm

      - name: ✨ Format and Lint
        run: |
          npm run format
          npm run lint

      - name: 🧪 Test with Jest
        run: npm run test

      - name: 📝 Bump Version and Release on Github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@martynus.net
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@martynus.net
        run: npx semantic-release

      # Uncomment to enable automatic EAS updates on staging merges
      # - name: 🚀 Update Staging with EAS
      #   run: eas update --auto --branch staging --non-interactive
