name: Production Release

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate-release-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      allow_release: ${{ steps.validate.outputs.allow_release }}
    steps:
      - name: Validate push source for production release
        id: validate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            // Manual dispatch is an explicit operator action, so allow it.
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual workflow_dispatch detected; allowing release.');
              core.setOutput('allow_release', 'true');
              return;
            }

            // This workflow should only auto-run for push events on main.
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setFailed(`Unexpected event/ref: ${context.eventName} ${context.ref}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const validPr = prs.data.find((pr) =>
              pr.base?.ref === 'main' &&
              pr.head?.ref === 'staging' &&
              pr.merged_at
            );

            if (!validPr) {
              core.setFailed(
                `Blocking production release: commit ${sha} is not from a merged staging -> main PR.`
              );
              return;
            }

            core.info(`Validated PR #${validPr.number} (${validPr.head.ref} -> ${validPr.base.ref}).`);
            core.setOutput('allow_release', 'true');

  create-github-release:
    needs: validate-release-source
    if: needs.validate-release-source.outputs.allow_release == 'true'
    runs-on: ubuntu-latest

    # Security: Explicit permissions for semantic-release and EAS
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # Use GH_PAT for checkout and semantic-release to bypass branch protection
      # persist-credentials: true ensures the token is used for subsequent git push
      # Falls back to github.token if GH_PAT is not configured
      - name: 🏗 Setup repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: true

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Install semantic-release extra plugins
        run: npm install --save-dev @semantic-release/changelog @semantic-release/git @semantic-release/npm

      - name: 📝 Bump Version and Release on Github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: npx semantic-release
