name: Production Release

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  create-github-release:
    runs-on: ubuntu-latest

    # Security: Explicit permissions for semantic-release and EAS
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # Use GH_PAT for checkout and semantic-release to bypass branch protection
      # persist-credentials: true ensures the token is used for subsequent git push
      # Falls back to github.token if GH_PAT is not configured
      - name: 🏗 Setup repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: true

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Install semantic-release extra plugins
        run: npm install --save-dev @semantic-release/changelog @semantic-release/git @semantic-release/npm

      - name: 📝 Bump Version and Release on Github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: npx semantic-release
