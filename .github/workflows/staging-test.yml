name: Staging Test
on:
  pull_request:
    types:
      - opened
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-staging-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✨ Format and Lint
        run: |
          npm run format
          npm run lint

      - name: 🧪 Test with Jest
        run: npm run test
