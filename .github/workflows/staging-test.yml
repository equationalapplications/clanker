name: Staging Test
on:
  pull_request:
    types:
      - opened
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-staging-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Install EAS CLI
        run: npm install -g eas-cli

      - name: ✨ Format and Lint
        run: |
          npm run format
          npm run lint

      - name: 🧪 Test with Jest
        run: npm run test
