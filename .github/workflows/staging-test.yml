name: Staging Test
on:
  pull_request:
    branches:
      - staging
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-staging-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✨ Format and Lint
        run: |
          npm run format
          npm run lint

      - name: 🧪 Test with Jest
        run: npm run test

      - name: 🧪 Test shared bridge (node:test)
        run: cd cloud-agent && npm ci && node --import tsx/esm --test ../shared/constants.test.ts ../shared/dsl-schema.test.ts ../shared/hostPolicy.test.ts

      - name: 🧪 Test Desktop Bridge extension
        run: cd extension && npm ci && npm test

      - name: 🧪 Test Cloud Agent
        run: cd cloud-agent && npm test
