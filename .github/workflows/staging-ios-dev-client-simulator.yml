name: Staging EAS Build iOS Dev Client for Simulator

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-staging-ios-simulator:
    runs-on: ubuntu-latest

    # Security: Restrict permissions to minimum required
    permissions:
      contents: read

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🚀 EAS Build iOS Dev Client for Simulator
        run: eas build -p ios --profile development-simulator --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
