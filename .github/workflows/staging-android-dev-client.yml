name: Staging EAS Build Android Dev Client

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-staging-android-dev-client:
    runs-on: ubuntu-latest

    # Security: Restrict permissions to minimum required
    permissions:
      contents: read

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 EAS Build Dev Client
        run: eas build -p android --profile development --non-interactive --no-wait
